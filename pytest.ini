[pytest]
asyncio_mode = auto
testpaths =
    tests/integration
    tests/unit
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q --ignore=tests/manual -p no:cacheprovider
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
    skip_llm: tests that require LLM access
filterwarnings =
    ignore:`json_encoders` is deprecated:DeprecationWarning:pydantic.*
    ignore:Support for class-based `config` is deprecated:DeprecationWarning:pydantic.*
    ignore:enable_cleanup_closed ignored because .* is fixed in Python version:DeprecationWarning:aiohttp.*
